name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: bin/deploy.sh
        env:
          MIX_ENV: prod

      - name: Verify
        run: |
          sleep 5
          curl -sf http://localhost:4000/api/health || exit 1
